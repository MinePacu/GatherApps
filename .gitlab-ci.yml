stages:
  - quality
  - build
  - test
  - security

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

variables:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  HOMEBREW_NO_AUTO_UPDATE: "1"
  AST_ENABLE_MR_PIPELINES: "true"
  SAST_EXCLUDED_PATHS: "DerivedData,TestResults,GatherApps.xcodeproj/xcuserdata"
  SECRET_DETECTION_EXCLUDED_PATHS: "DerivedData,TestResults,GatherApps.xcodeproj/xcuserdata"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

.macos-runner:
  # Use a self-hosted macOS runner tagged `macos`.
  # Free-tier GitLab projects cannot rely on SaaS macOS hosted runners.
  tags:
    - macos
  interruptible: true
  timeout: 30m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

sast:
  stage: security

secret_detection:
  stage: security

code-quality:
  extends: .macos-runner
  stage: quality
  allow_failure: true
  script:
    - mkdir -p CodeQuality
    - if ! command -v swiftlint >/dev/null; then brew install swiftlint; fi
    - swiftlint lint --reporter json > CodeQuality/swiftlint.json || SWIFTLINT_STATUS=$?
    - ruby ci/swiftlint-codequality.rb CodeQuality/swiftlint.json CodeQuality/gl-code-quality-report.json
    - exit ${SWIFTLINT_STATUS:-0}
  artifacts:
    when: always
    paths:
      - CodeQuality/swiftlint.json
      - CodeQuality/gl-code-quality-report.json
    reports:
      codequality: CodeQuality/gl-code-quality-report.json
    expire_in: 1 week

resolve-and-build:
  extends: .macos-runner
  stage: build
  script:
    - xcodebuild -version
    - >
      xcodebuild -resolvePackageDependencies
      -project GatherApps.xcodeproj
      -scheme GatherApps
    - >
      xcodebuild build
      -project GatherApps.xcodeproj
      -scheme GatherApps
      -configuration Release
      -destination 'platform=macOS'
      -derivedDataPath DerivedData
      CODE_SIGNING_ALLOWED=NO

test:
  extends: .macos-runner
  stage: test
  needs:
    - resolve-and-build
  script:
    - xcodebuild -version
    - mkdir -p TestResults TestReports
    - if ! command -v xcpretty >/dev/null; then gem install xcpretty --no-document; fi
    - set -o pipefail
    - >
      xcodebuild test
      -project GatherApps.xcodeproj
      -scheme GatherApps
      -configuration Debug
      -destination 'platform=macOS,arch=x86_64'
      -parallel-testing-enabled NO
      -skip-testing:GatherAppsTests/GatherAppsTests/testDeletingGroupRemovesPersistedGroupAndGeneratedLauncher
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCreatesAppBundle
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCanCreateLauncherThatShowsGatherAppsWindow
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDefaultsToUserApplicationsLaunchersDirectory
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCopiesRuntimeExecutableForCommandTabVisibility
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesExistingLauncherWhenRuntimeIsStale
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorTerminatesRegeneratesAndRelaunchesRunningStaleLauncher
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotRelaunchNonRunningStaleLauncher
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotTerminateCurrentRunningLauncher
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorForceTerminatesBeforeRegeneratingWhenGracefulTerminationFails
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorIgnoresMissingLauncherDuringStaleCheck
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotRegenerateCurrentLauncher
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesLauncherWhenAppBundlePathIsStale
      -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesLauncherWhenSchemaMetadataIsMissing
      -skip-testing:GatherAppsTests/GatherAppsTests/testAppGroupStorePersistsLauncherWindowPolicyAndRegeneratesStaleLaunchersOnLoad
      -skip-testing:GatherAppsTests/GatherAppsTests/testGeneratingLauncherPersistsLauncherWindowPolicy
      -derivedDataPath DerivedData
      -resultBundlePath TestResults/GatherAppsTests.xcresult
      MACOSX_DEPLOYMENT_TARGET=26.0
      CODE_SIGNING_ALLOWED=NO
      | xcpretty --report junit --output TestReports/junit.xml
  artifacts:
    when: always
    paths:
      - TestResults/
      - TestReports/
    reports:
      junit: TestReports/junit.xml
    expire_in: 1 week

launcher-integration-test:
  extends: .macos-runner
  stage: test
  needs:
    - resolve-and-build
  allow_failure: true
  script:
    - xcodebuild -version
    - mkdir -p TestResults TestReports
    - if ! command -v xcpretty >/dev/null; then gem install xcpretty --no-document; fi
    - set -o pipefail
    - >
      xcodebuild test
      -project GatherApps.xcodeproj
      -scheme GatherApps
      -configuration Debug
      -destination 'platform=macOS,arch=x86_64'
      -parallel-testing-enabled NO
      -only-testing:GatherAppsTests/GatherAppsTests/testDeletingGroupRemovesPersistedGroupAndGeneratedLauncher
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCreatesAppBundle
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCanCreateLauncherThatShowsGatherAppsWindow
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDefaultsToUserApplicationsLaunchersDirectory
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCopiesRuntimeExecutableForCommandTabVisibility
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesExistingLauncherWhenRuntimeIsStale
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorTerminatesRegeneratesAndRelaunchesRunningStaleLauncher
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotRelaunchNonRunningStaleLauncher
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotTerminateCurrentRunningLauncher
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorForceTerminatesBeforeRegeneratingWhenGracefulTerminationFails
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorIgnoresMissingLauncherDuringStaleCheck
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotRegenerateCurrentLauncher
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesLauncherWhenAppBundlePathIsStale
      -only-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesLauncherWhenSchemaMetadataIsMissing
      -only-testing:GatherAppsTests/GatherAppsTests/testAppGroupStorePersistsLauncherWindowPolicyAndRegeneratesStaleLaunchersOnLoad
      -only-testing:GatherAppsTests/GatherAppsTests/testGeneratingLauncherPersistsLauncherWindowPolicy
      -derivedDataPath DerivedData
      -resultBundlePath TestResults/GatherAppsLauncherIntegrationTests.xcresult
      MACOSX_DEPLOYMENT_TARGET=26.0
      CODE_SIGNING_ALLOWED=NO
      | xcpretty --report junit --output TestReports/launcher-junit.xml
  artifacts:
    when: always
    paths:
      - TestResults/
      - TestReports/
    reports:
      junit: TestReports/launcher-junit.xml
    expire_in: 1 week
