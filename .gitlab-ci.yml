# GatherApps CI/CD Pipeline
# Requires a macOS runner with Xcode 15+ available.
# On GitLab.com, macOS SaaS runners require a Premium/Ultimate subscription.
# If you are on the Free tier, register a self-hosted macOS runner and update
# the `tags` and `image` values below to match your runner's configuration.

stages:
  - build
  - test

# ── Shared defaults ──────────────────────────────────────────────
default:
  # macOS 15 runner with Xcode 16 pre-installed (GitLab.com SaaS — GA image).
  # Replace tag and image if self-hosting.
  tags:
    - saas-macos-medium-m1
  image: macos-15-xcode-16
  before_script:
    # Prevent Homebrew from auto-updating on every job (saves ~1–2 min).
    - export HOMEBREW_NO_AUTO_UPDATE=1
    # xcpretty is not pre-installed on GitLab macOS runners; install it here.
    # It formats xcodebuild output into a readable log.
    - gem install xcpretty --no-document --quiet

# ── Derived-data cache ────────────────────────────────────────────────
# Caching DerivedData avoids recompiling unchanged modules on every run,
# which can cut build times significantly for a project of this size.
.xcode-cache:
  cache:
    key: "$CI_COMMIT_REF_SLUG-xcode-derived-data"
    paths:
      - DerivedData/
    policy: pull-push

# ── Rules ───────────────────────────────────────────────────────────────
# Run on every push to any branch and on merge request pipelines.
.rules-default:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Build ───────────────────────────────────────────────────────────────────
build:
  extends:
    - .xcode-cache
    - .rules-default
  stage: build
  # Build without code signing — certificates are not available in CI.
  # CODE_SIGNING_REQUIRED=NO and CODE_SIGN_IDENTITY="" disable signing entirely.
  script:
    # Pipe through xcpretty for readable output; use set -o pipefail so that
    # a non-zero xcodebuild exit code is not masked by xcpretty's success.
    - set -o pipefail
    - xcodebuild build
        -project GatherApps.xcodeproj
        -scheme GatherApps
        -configuration Debug
        -derivedDataPath DerivedData
        CODE_SIGN_IDENTITY=""
        CODE_SIGNING_REQUIRED=NO
        CODE_SIGNING_ALLOWED=NO
        | xcpretty
  artifacts:
    # Retain the build products so the test job can reuse them.
    paths:
      - DerivedData/Build/Products/
    expire_in: 1 hour

# ── Unit Tests ────────────────────────────────────────────────────────────────
unit-test:
  extends:
    - .xcode-cache
    - .rules-default
  stage: test
  # Reuse build products from the build job — no need to recompile.
  needs:
    - job: build
      artifacts: true
  # dependencies: [] is intentional — artifacts are already pulled via `needs`.
  dependencies: []
  script:
    # Pipe through xcpretty for readable output; use set -o pipefail so that
    # a non-zero xcodebuild exit code is not masked by xcpretty's success.
    - set -o pipefail
    - xcodebuild test
        -project GatherApps.xcodeproj
        -scheme GatherApps
        -configuration Debug
        -derivedDataPath DerivedData
        -resultBundlePath TestResults/GatherAppsTests.xcresult
        -only-testing:GatherAppsTests
        CODE_SIGN_IDENTITY=""
        CODE_SIGNING_REQUIRED=NO
        CODE_SIGNING_ALLOWED=NO
        | xcpretty
  artifacts:
    # Preserve the .xcresult bundle for review in GitLab or Xcode.
    when: always
    paths:
      - TestResults/
    expire_in: 7 days
