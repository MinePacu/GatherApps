name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project GatherApps.xcodeproj \
            -scheme GatherApps

      - name: Build
        run: |
          xcodebuild build \
            -project GatherApps.xcodeproj \
            -scheme GatherApps \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project GatherApps.xcodeproj \
            -scheme GatherApps \
            -configuration Debug \
            -destination 'platform=macOS,arch=x86_64' \
            -parallel-testing-enabled NO \
            -skip-testing:GatherAppsTests/GatherAppsTests/testDeletingGroupRemovesPersistedGroupAndGeneratedLauncher \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCreatesAppBundle \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCanCreateLauncherThatShowsGatherAppsWindow \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDefaultsToUserApplicationsLaunchersDirectory \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorCopiesRuntimeExecutableForCommandTabVisibility \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesExistingLauncherWhenRuntimeIsStale \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorTerminatesRegeneratesAndRelaunchesRunningStaleLauncher \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotRelaunchNonRunningStaleLauncher \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotTerminateCurrentRunningLauncher \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorForceTerminatesBeforeRegeneratingWhenGracefulTerminationFails \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorIgnoresMissingLauncherDuringStaleCheck \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorDoesNotRegenerateCurrentLauncher \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesLauncherWhenAppBundlePathIsStale \
            -skip-testing:GatherAppsTests/GatherAppsTests/testLauncherGeneratorRegeneratesLauncherWhenSchemaMetadataIsMissing \
            -skip-testing:GatherAppsTests/GatherAppsTests/testAppGroupStorePersistsLauncherWindowPolicyAndRegeneratesStaleLaunchersOnLoad \
            -skip-testing:GatherAppsTests/GatherAppsTests/testGeneratingLauncherPersistsLauncherWindowPolicy \
            -derivedDataPath DerivedData \
            MACOSX_DEPLOYMENT_TARGET=26.0 \
            CODE_SIGNING_ALLOWED=NO
